<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rashidul@rahul:~$</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="terminal" id="terminal">
  <div class="term-header">
    <div class="term-dots">
      <span class="red"></span><span class="yellow"></span><span class="green"></span>
    </div>
    <span class="term-title">rashidul@rahul: ~/portfolio</span>
    <div class="quick-cmds">
      <button onclick="run('about')">about</button>
      <button onclick="run('skills')">skills</button>
      <button onclick="run('experience')">experience</button>
      <button onclick="run('projects')">projects</button>
      <button onclick="run('contact')">contact</button>
      <button onclick="run('help')">help</button>
    </div>
  </div>

  <div class="output" id="output"></div>

  <div class="input-line" id="input-line">
    <span class="prompt">
      <span class="user">rashidul</span><span class="sep">@</span><span class="host">rahul</span><span class="sep">:</span><span class="path">~</span><span class="sym">$</span>
    </span>
    <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false"
           placeholder="type 'help' to get started...">
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
