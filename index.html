<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rashidul@rahul:~$</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', 'Consolas', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', 'Consolas', monospace;
    }

    /* Background grid */
    .bg-grid {
      background-image:
        linear-gradient(rgba(16,185,129,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Scanlines overlay */
    .scanlines::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,.12) 0px, rgba(0,0,0,.12) 1px, transparent 1px, transparent 3px);
      pointer-events: none;
      z-index: 50;
    }

    /* Cursor blink */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor-blink { animation: blink 1s step-end infinite; }

    /* Fade in for new lines */
    @keyframes termFadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
    .term-line { animation: termFadeIn .08s ease-out forwards; }

    /* Terminal scrollbar */
    #term-output::-webkit-scrollbar { width: 5px; }
    #term-output::-webkit-scrollbar-track { background: transparent; }
    #term-output::-webkit-scrollbar-thumb { background: rgba(16,185,139,.15); border-radius: 3px; }
    #term-output::-webkit-scrollbar-thumb:hover { background: rgba(16,185,139,.25); }

    /* Input caret */
    #cmd-input { caret-color: #10b981; }

    /* Glow on terminal window */
    .term-glow {
      box-shadow: 0 0 60px rgba(16,185,129,.04), 0 0 120px rgba(16,185,129,.02), 0 0 0 1px rgba(16,185,129,.08);
    }

    /* Responsive ASCII scaling */
    @media (max-width: 768px) { .ascii-art { font-size: 6px; line-height: 1.1; } }
    @media (max-width: 480px) { .ascii-art { font-size: 4.5px; line-height: 1.05; } }
  </style>
</head>
<body class="bg-neutral-950 text-emerald-400 min-h-screen overflow-x-hidden scanlines">
  <div class="fixed inset-0 bg-grid pointer-events-none z-0"></div>

  <!-- ===== TERMINAL WINDOW ===== -->
  <div class="relative z-10 min-h-screen flex items-start justify-center p-3 sm:p-5 md:p-8">
    <div id="terminal"
         class="w-full max-w-4xl bg-neutral-900/90 backdrop-blur-sm rounded-xl md:rounded-2xl term-glow flex flex-col overflow-hidden border border-neutral-800/60"
         style="min-height: calc(100vh - 1.5rem);">

      <!-- Header bar -->
      <div class="flex items-center gap-2 sm:gap-3 px-4 py-3 bg-neutral-900 border-b border-neutral-800/50 shrink-0 select-none">
        <div class="flex gap-1.5 shrink-0">
          <span class="w-3 h-3 rounded-full bg-red-500/70"></span>
          <span class="w-3 h-3 rounded-full bg-amber-400/70"></span>
          <span class="w-3 h-3 rounded-full bg-emerald-500/70"></span>
        </div>
        <span class="text-xs text-neutral-600 ml-2 truncate flex-1 font-mono">rashidul@rahul: ~/portfolio</span>
        <!-- Quick command buttons -->
        <div class="hidden sm:flex items-center gap-1">
          <button onclick="window.runCmd('about')"      class="px-2.5 py-1 text-[10px] text-neutral-500 bg-neutral-800/40 border border-neutral-700/30 rounded hover:bg-neutral-800 hover:text-emerald-400 hover:border-emerald-500/20 transition-all font-mono">about</button>
          <button onclick="window.runCmd('skills')"     class="px-2.5 py-1 text-[10px] text-neutral-500 bg-neutral-800/40 border border-neutral-700/30 rounded hover:bg-neutral-800 hover:text-emerald-400 hover:border-emerald-500/20 transition-all font-mono">skills</button>
          <button onclick="window.runCmd('experience')" class="px-2.5 py-1 text-[10px] text-neutral-500 bg-neutral-800/40 border border-neutral-700/30 rounded hover:bg-neutral-800 hover:text-emerald-400 hover:border-emerald-500/20 transition-all font-mono">experience</button>
          <button onclick="window.runCmd('projects')"   class="px-2.5 py-1 text-[10px] text-neutral-500 bg-neutral-800/40 border border-neutral-700/30 rounded hover:bg-neutral-800 hover:text-emerald-400 hover:border-emerald-500/20 transition-all font-mono">projects</button>
          <button onclick="window.runCmd('contact')"    class="px-2.5 py-1 text-[10px] text-neutral-500 bg-neutral-800/40 border border-neutral-700/30 rounded hover:bg-neutral-800 hover:text-emerald-400 hover:border-emerald-500/20 transition-all font-mono">contact</button>
          <button onclick="window.runCmd('help')"       class="px-2.5 py-1 text-[10px] text-neutral-500 bg-neutral-800/40 border border-neutral-700/30 rounded hover:bg-neutral-800 hover:text-emerald-400 hover:border-emerald-500/20 transition-all font-mono">help</button>
        </div>
        <!-- Mobile command pills -->
        <div class="flex sm:hidden items-center gap-0.5 overflow-x-auto">
          <button onclick="window.runCmd('about')" class="px-1.5 py-0.5 text-[9px] text-neutral-500 bg-neutral-800/40 border border-neutral-700/30 rounded hover:bg-neutral-800 hover:text-emerald-400 transition-all font-mono whitespace-nowrap">about</button>
          <button onclick="window.runCmd('skills')" class="px-1.5 py-0.5 text-[9px] text-neutral-500 bg-neutral-800/40 border border-neutral-700/30 rounded hover:bg-neutral-800 hover:text-emerald-400 transition-all font-mono whitespace-nowrap">skills</button>
          <button onclick="window.runCmd('exp')" class="px-1.5 py-0.5 text-[9px] text-neutral-500 bg-neutral-800/40 border border-neutral-700/30 rounded hover:bg-neutral-800 hover:text-emerald-400 transition-all font-mono whitespace-nowrap">exp</button>
          <button onclick="window.runCmd('projects')" class="px-1.5 py-0.5 text-[9px] text-neutral-500 bg-neutral-800/40 border border-neutral-700/30 rounded hover:bg-neutral-800 hover:text-emerald-400 transition-all font-mono whitespace-nowrap">prj</button>
          <button onclick="window.runCmd('help')" class="px-1.5 py-0.5 text-[9px] text-neutral-500 bg-neutral-800/40 border border-neutral-700/30 rounded hover:bg-neutral-800 hover:text-emerald-400 transition-all font-mono whitespace-nowrap">help</button>
        </div>
      </div>

      <!-- Output area -->
      <div id="term-output" class="flex-1 overflow-y-auto px-4 sm:px-6 py-4 text-sm leading-relaxed font-mono" style="word-break: break-word;">
        <!-- Content injected by JS -->
      </div>

      <!-- Input line -->
      <div class="flex items-center gap-2 px-4 sm:px-6 py-3 border-t border-neutral-800/50 bg-neutral-900/50 shrink-0 font-mono text-sm">
        <span class="text-cyan-400 whitespace-nowrap select-none">rashidul</span>
        <span class="text-neutral-600 select-none">@</span>
        <span class="text-purple-400 whitespace-nowrap select-none">rahul</span>
        <span class="text-neutral-600 select-none">:</span>
        <span class="text-amber-400 whitespace-nowrap select-none">~</span>
        <span class="text-emerald-400 select-none">$</span>
        <input type="text" id="cmd-input"
               class="flex-1 bg-transparent border-none outline-none text-emerald-300 font-mono text-sm ml-1"
               placeholder="type 'help' to get started..."
               autofocus autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>

  <!-- JS: terminal engine -->
  <script src="js/main.js"></script>
</body>
</html>
